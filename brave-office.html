<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloBrave Office</title>
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/chat.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">SB</div>
          <div class="brand-text">
            <span class="brand-name">SoloBrave</span>
            <span class="brand-tagline">AI Team</span>
          </div>
        </div>
      </div>
      <nav class="employee-list" id="employee-list"></nav>
      <div class="sidebar-footer">
        <div class="api-status-card" id="api-status">
          <div class="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">No API</span>
          </div>
          <button class="btn-config" onclick="window.location.href='lobster-office.html#settings'">Config</button>
        </div>
        <a href="lobster-office.html" class="admin-link"><span>HQ</span> Admin</a>
      </div>
    </aside>

    <main class="chat-main" id="chat-main">
      <div class="chat-header glass-panel">
        <div class="chat-employee-info" id="chat-employee-info"></div>
        <div class="chat-actions">
          <button class="btn-icon" onclick="clearChat()">Clear</button>
          <button class="btn-icon" onclick="toggleKnowledge()">KB</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area glass-panel">
        <div class="input-wrapper">
          <textarea id="message-input" placeholder="Talk to AI employee..." rows="1" onkeydown="handleInputKeydown(event)"></textarea>
          <button class="btn-send" onclick="sendMessage()">Send</button>
        </div>
        <div class="input-hints"><span>Enter to send, Shift+Enter for new line</span></div>
      </div>
    </main>
  </div>

  <script src="./js/store.js"></script>
  <script src="./js/ai-gateway.js"></script>

  <script>
  window.escapeHtml = function(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  };
  </script>

  <script>
  window.renderEmployeeList = function() {
    var Store = window.SoloBraveStore;
    var list = document.getElementById('employee-list');
    if (!list) return;
    var employees = Store.get('employees') || [];
    var html = '';
    for (var i = 0; i < employees.length; i++) {
      var emp = employees[i];
      var activeClass = (window.currentEmployee && window.currentEmployee.id === emp.id) ? 'active' : '';
      html += '<div class="employee-card ' + activeClass + '" onclick="selectEmployee(\'' + emp.id + '\')">';
      html += '<div class="employee-avatar" style="background: linear-gradient(135deg, ' + emp.gradient[0] + ' 0%, ' + emp.gradient[1] + ' 100%)">' + emp.avatar + '<span class="status-ring ' + emp.status + '"></span></div>';
      html += '<div class="card-info"><div class="card-name">' + emp.name + '</div><div class="card-role">' + emp.role + '</div></div>';
      html += '</div>';
    }
    list.innerHTML = html;
  };
  </script>

  <script>
  window.selectEmployee = function(employeeId) {
    var Store = window.SoloBraveStore;
    var employees = Store.get('employees') || [];
    for (var i = 0; i < employees.length; i++) {
      if (employees[i].id === employeeId) {
        window.currentEmployee = employees[i];
        break;
      }
    }
    renderEmployeeList();
    renderChatHeader();
    renderMessages();
  };
  </script>

  <script>
  window.renderChatHeader = function() {
    var header = document.getElementById('chat-employee-info');
    if (!header) return;
    if (!window.currentEmployee) {
      header.innerHTML = '<span>Select an employee to start</span>';
      return;
    }
    var emp = window.currentEmployee;
    header.innerHTML = '<div class="employee-avatar" style="background: linear-gradient(135deg, ' + emp.gradient[0] + ' 0%, ' + emp.gradient[1] + ' 100%)">' + emp.avatar + '<span class="status-ring ' + emp.status + '"></span></div><div class="employee-details"><span class="employee-name">' + emp.name + '</span><span class="employee-role">' + emp.role + ' - ' + emp.personality + '</span></div>';
  };
  </script>

  <script>
  window.renderMessages = function() {

    if (!container) return;

      container.innerHTML = '<div class="empty-state"><div class="empty-icon">SB</div><div class="empty-title">Welcome</div><div class="empty-desc">Select an AI employee from the left</div></div>';
