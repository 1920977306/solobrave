<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloBrave Office - AI 员工管理平台</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa; color: #1a1a2e; height: 100vh; overflow: hidden;
    }
    #app { height: 100vh; display: flex; }
  </style>
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">SB</div>
          <span class="logo-text">SoloBrave</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="office">
          <span class="nav-icon">🏢</span><span class="nav-text">办公室</span>
        </a>
        <a href="#" class="nav-item" data-view="chat">
          <span class="nav-icon">💬</span><span class="nav-text">对话</span>
        </a>
        <a href="#" class="nav-item" data-view="recruit">
          <span class="nav-icon">➕</span><span class="nav-text">招聘</span>
        </a>
        <a href="#" class="nav-item" data-view="task">
          <span class="nav-icon">📋</span><span class="nav-text">任务</span>
        </a>
        <a href="#" class="nav-item" data-view="knowledge">
          <span class="nav-icon">📚</span><span class="nav-text">知识库</span>
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span><span class="nav-text">设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="api-status" id="api-status">
          <span class="status-dot"></span>
          <span class="status-text">未配置 API</span>
        </div>
      </div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <!-- 数据层 -->
  <script src="js/store.js"></script>

  <!-- UI 层 -->
  <script src="js/ui-office.js"></script>
  <script src="js/ui-chat.js"></script>
  <script src="js/ui-task.js"></script>
  <script src="js/ui-settings.js"></script>

  <!-- 入口（必须最后） -->
  <script src="js/app.js"></script>
</body>
</html>
